<div class="h-screen flex flex-col bg-[#0f172a]">
  <!-- Top Navigation Bar -->
  <nav class="bg-[#1e293b] border-b border-slate-700/60 px-6 py-4 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-4">
      <a routerLink="/folder" class="text-slate-400 hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
      </a>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>
        </div>
        <span class="text-xl font-bold text-white tracking-tight">DevSnip</span>
      </div>
    </div>
    
    <div class="flex items-center gap-4">
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg class="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        </div>
        <input type="text" class="bg-[#0f172a] border border-slate-700 text-white text-sm rounded-full pl-10 pr-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 w-64 transition-all placeholder-slate-500" placeholder="Search snippets globally...">
      </div>
      <button class="w-9 h-9 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-400 hover:text-white hover:border-slate-500 transition-all">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
      </button>
      <div class="w-9 h-9 rounded-full bg-gradient-to-r from-cyan-500 to-blue-500 border-2 border-[#1e293b] flex items-center justify-center text-white font-bold cursor-pointer">
        JD
      </div>
    </div>
  </nav>

  <div class="flex flex-1 overflow-hidden">
    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto w-full">
      <div class="px-8 py-8 w-full max-w-5xl mx-auto">
        <!-- Loading State -->
        <div *ngIf="!snippet" class="flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
        </div>

        <div *ngIf="snippet" class="w-full">
            <!-- Header -->
            <header class="flex justify-between items-start mb-8 w-full">
            <div class="w-full">
                <div class="flex items-center gap-3 mb-2 w-full">
                <h1 class="text-3xl font-bold text-white tracking-tight">{{snippet.title}}</h1>
                <span class="px-3 py-1 bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-full text-xs font-medium">{{snippet.language || 'Unknown'}}</span>
                </div>
                <p class="text-slate-400 text-lg">{{snippet.description}}</p>
            </div>
            <div class="flex gap-3">
                <button class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-lg text-sm font-medium transition-colors border border-slate-700/50">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                Copy
                </button>
                <button class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-lg text-sm font-medium transition-colors border border-slate-700/50">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                Edit
                </button>
                <button class="flex items-center gap-2 px-4 py-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-lg text-sm font-medium transition-colors border border-red-500/20">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                Delete
                </button>
            </div>
            </header>
            
            <!-- Code Block container with dynamic syntax highlighting -->
            <div class="relative bg-[#1e293b] rounded-xl border border-slate-700/50 overflow-hidden mb-8 w-full shadow-lg">
              <!-- Code header bar -->
              <div class="flex items-center justify-between px-4 py-3 border-b border-slate-700/50 bg-[#0f172a]/50">
                <div class="flex space-x-2">
                  <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                  <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                  <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                </div>
                <div class="text-xs font-mono text-slate-400">{{(snippet.language || 'text').toLowerCase()}}</div>
              </div>
              
              <!-- Syntax highlighted code -->
              <pre class="w-full text-sm font-mono overflow-auto p-4"><code [highlight]="snippet.code_content" [language]="(snippet.language || 'text').toLowerCase()"></code></pre>
            </div>
            
            <!-- Metadata Cards -->
            <div class="grid grid-cols-2 gap-4 w-full">
                <div class="bg-[#1e293b] rounded-xl p-4 border border-slate-700/50">
                    <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Snippet ID</div>
                    <div class="text-slate-300 font-medium">{{snippet.snippetId}}</div>
                </div>
            </div>
        </div>
      </div>
    </main>
  </div>
</div>
